name: Deploy Production Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy na AWS via Docker (Front) — zero downtime
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_FRONTEND_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            cd /home/ec2-user/front-n1

            # Atualiza o código
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Garante permissão de execução no script
            chmod +x deploy.sh

            # Sobe nginx na primeira vez (se ainda não estiver rodando)
            docker compose up -d nginx || true

            # Deploy blue-green sem downtime
            ./deploy.sh
