name: Deploy Production Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy na AWS via Docker (Front)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_FRONTEND_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /home/ec2-user/front-n1
            git checkout main
            git pull origin main
            
            # Limpeza preventiva para não lotar o disco da EC2
            docker image prune -f
            
            # Build e Restart automático
            docker-compose up --build -d
            # O comando abaixo limpa imagens antigas e paradas automaticamente
            docker image prune -f