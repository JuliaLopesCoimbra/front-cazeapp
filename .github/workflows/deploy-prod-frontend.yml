name: Deploy Production Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy na AWS Produção (Front)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_FRONTEND_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /home/ec2-user/front-n1
            git checkout main
            git pull origin main
            npm install
            npm run build
            pm2 restart front-prod # Ou o nome do processo PM2 na máquina de prod