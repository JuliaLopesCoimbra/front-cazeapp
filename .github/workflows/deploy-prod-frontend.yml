name: Deploy Production Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy na AWS via Docker (Front)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_FRONTEND_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            cd /home/ec2-user/front-n1
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Limpeza preventiva para não lotar o disco da EC2
            docker image prune -f

            # Para e remove container antigo se existir
            docker rm -f n1-front || true

            # Para pm2 se estiver rodando (conflito com Docker na porta 3000)
            pm2 stop all || true
            pm2 delete all || true

            # Libera a porta 3000 se algum processo ainda estiver usando
            sudo fuser -k 3000/tcp || true

            # Build e Restart automático
            docker compose up --build -d
            docker image prune -f