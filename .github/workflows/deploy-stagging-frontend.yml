name: Deploy Staging Frontend

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Staging — zero downtime
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            cd /home/ec2-user/front-n1

            # Atualiza o código
            git fetch origin
            git checkout develop
            git reset --hard origin/develop

            # Garante permissão de execução no script
            chmod +x deploy.sh

            # Remove container legado (libera porta 3000 na migração inicial)
            docker rm -f n1-front || true

            # Sobe nginx na primeira vez (se ainda não estiver rodando)
            docker compose up -d nginx || true

            # Deploy blue-green sem downtime
            ./deploy.sh
