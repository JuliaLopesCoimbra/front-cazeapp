name: Deploy Staging Frontend # Nome Único
on:
  push:
    branches:
      - develop
    paths:
      - 'frontend/**' # Opcional: só dispara se mudar algo na pasta do front
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST_FRONT }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /home/ec2-user/staging-front
            git pull origin develop
            docker compose up --build -d